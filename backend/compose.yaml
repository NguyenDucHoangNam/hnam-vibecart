services:

  # --- Các dịch vụ hạ tầng bổ trợ ---
  elasticsearch:
    image: 'elasticsearch:7.17.10'
    container_name: vibecart-elasticsearch
    environment:
      - 'ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-changeme}'
      - 'discovery.type=single-node'
      - 'xpack.security.enabled=false'
    ports:
      - '${ELASTIC_PORT:-9200}:9200'
      - '9300:9300'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  mongodb:
    image: 'mongo:latest'
    container_name: vibecart-mongodb
    environment:
      - 'MONGO_INITDB_DATABASE=${MONGO_DB:-vibecart_db}'
      - 'MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}'
      - 'MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}'
    ports:
      - '${MONGO_PORT:-27018}:27017'
    volumes:
      - mongodb_data:/data/db

  postgres:
    image: 'postgres:latest'
    container_name: vibecart-postgres
    environment:
      - 'POSTGRES_DB=${DB_NAME:-vibecart}'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD}'
      - 'POSTGRES_USER=${DB_USER}'
    ports:
      - '${DB_PORT:-5435}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-vibecart}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: 'redis:latest'
    container_name: vibecart-redis
    ports:
      - '${REDIS_PORT:-6379}:6379'

  kafka:
    image: 'apache/kafka:latest'
    container_name: vibecart-kafka
    ports:
      - '${KAFKA_PORT:-9092}:9092'
      - '29092:29092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9092,EXTERNAL://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  minio:
    image: 'minio/minio:latest'
    container_name: vibecart-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    command: server /data --console-address ":9001"

volumes:
  minio_data:
  elasticsearch_data:
  mongodb_data:
  postgres_data:


